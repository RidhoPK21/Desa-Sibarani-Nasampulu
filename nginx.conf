server {
    listen 80;

    # 1. Pintu masuk ke Auth Service
    location /api/auth/ {
        proxy_pass http://auth-service:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Pintu masuk ke Info Service (Berita dll)
    location /api/info/ {
        proxy_pass http://info-service:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Pintu masuk ke Statistic Service
    location /api/statistic/ {
        proxy_pass http://statistic-service:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Pintu masuk ke Content Service
    location /api/content/ {
        proxy_pass http://content-service:8003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}